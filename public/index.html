<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plan de table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <span class="ring">💍</span>
      <div class="titles">
        <input id="eventTitle" class="event-title" placeholder="Notre mariage" />
        <input id="eventDate" class="event-date" placeholder="Ajouter une date…" />
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="actions">
      <button id="autoBtn" class="btn ghost" title="Remplir les places libres automatiquement">✨ Placer auto</button>
      <button id="exportBtn" class="btn ghost" title="Télécharger le plan (CSV / Excel)">⬇️ Export</button>
      <button id="printBtn" class="btn ghost" title="Imprimer / Exporter en PDF">🖨️ Imprimer</button>
    </div>
  </header>

  <main class="layout">
    <!-- Sidebar : guests -->
    <aside class="sidebar">
      <div class="panel">
        <form id="guestForm" class="guest-form">
          <input id="guestName" placeholder="Nom de l'invité…" autocomplete="off" />
          <select id="guestGroup" class="group-select"></select>
          <button class="btn primary" type="submit">Ajouter</button>
        </form>
        <div class="search-row">
          <input id="search" class="search" placeholder="🔍 Rechercher…" autocomplete="off" />
          <button id="importBtn" class="link-btn" title="Coller une liste de noms">⊕ Importer une liste</button>
        </div>
      </div>

      <div class="pool-head">
        <h2>À placer <span id="unplacedCount" class="pill"></span></h2>
        <button id="unseatAll" class="link-btn" title="Tout dé-placer">tout libérer</button>
      </div>
      <div id="poolFilter" class="pool-filter"></div>
      <div id="pool" class="pool"></div>

      <div class="groups-head">
        <h2>Groupes</h2>
        <button id="addGroup" class="link-btn">+ groupe</button>
      </div>
      <div id="groupList" class="group-list"></div>
    </aside>

    <!-- Board : tables -->
    <section class="board-wrap">
      <div class="board-toolbar">
        <button class="btn" data-add="round">⊕ Table ronde</button>
        <button class="btn" data-add="rect">⊕ Table rectangle</button>
        <span class="hint">Glissez les invités sur les chaises · déplacez les tables sur le plan</span>
      </div>
      <div id="board" class="board"></div>
    </section>
  </main>

  <!-- Import modal -->
  <div id="importModal" class="modal-backdrop" hidden>
    <div class="modal">
      <h2>Importer une liste d'invités</h2>
      <p class="modal-hint">Un nom par ligne. Vous pourrez les répartir dans les groupes ensuite.</p>
      <textarea id="importText" placeholder="Marie Dupont&#10;Jean Martin&#10;Sophie Leroy&#10;…"></textarea>
      <label class="modal-row">Groupe&nbsp;:
        <select id="importGroup" class="group-select"></select>
      </label>
      <div class="modal-actions">
        <button class="btn ghost" data-close>Annuler</button>
        <button class="btn primary" id="importConfirm">Ajouter</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
